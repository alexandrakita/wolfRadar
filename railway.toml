# wolfRadar API — Railway web service
# https://docs.railway.com/guides/config-as-code
#
# Setup in Railway dashboard:
# 1. New Project → Deploy from GitHub repo
# 2. Service "api" — uses this file (or set config path to railway.toml)
# 3. Add Volume → mount path: /data
# 4. Variables: WOLF_DATA_DIR=/data, NODE_ENV=production
# 5. Generate domain → set Vercel STOCKY_BACKEND_URL to that URL

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["backend/**", "frontend/src/data/stock-universe-data.json", "Dockerfile"]

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
