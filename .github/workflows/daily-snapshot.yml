name: Daily screener snapshot

on:
  schedule:
    # 11:00 UTC Mon–Fri (after US market data settles)
    - cron: "0 11 * * 1-5"
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build screener snapshot (SQLite, ephemeral)
        run: npm run build-snapshot
        env:
          SNAPSHOT_STORE: sqlite

      - name: Publish snapshot to Upstash Redis
        run: npm run publish-redis
        env:
          PUBLISH_REDIS: "1"
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
